<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reforma Ley PRL 2026 | CCOO Industria Airbus</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --rojo: #CC0000;
    --rojo-vivo: #E8000A;
    --rojo-oscuro: #8B0000;
    --rojo-suave: #FF3333;
    --negro: #0A0A0A;
    --gris-oscuro: #1A1A1A;
    --gris-medio: #2D2D2D;
    --gris-claro: #F5F0EE;
    --blanco: #FFFFFF;
    --crema: #FDF8F5;
    --dorado: #C9952A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Source Serif 4', serif;
    background: #FFFFFF;
    color: var(--negro);
    overflow-x: hidden;
  }

  /* ─── HEADER ─────────────────────────────────── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(255,255,255,0.97);
    backdrop-filter: blur(12px);
    border-bottom: 2px solid var(--rojo);
    padding: 0 40px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 20px rgba(0,0,0,0.08);
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .ccoo-logo-img {
    height: 48px;
    width: auto;
    flex-shrink: 0;
    object-fit: contain;
  }

  .org-name {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    line-height: 1.3;
    color: var(--negro);
  }

  .org-name span {
    display: block;
    color: var(--rojo);
    font-size: 10px;
    letter-spacing: 0.15em;
    font-weight: 400;
  }

  .header-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--rojo);
    border: 1px solid var(--rojo);
    padding: 4px 10px;
    letter-spacing: 0.05em;
  }

  /* ─── HERO ────────────────────────────────────── */
  .hero {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    padding-top: 64px;
    position: relative;
    overflow: hidden;
    background: #FFFFFF;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse 60% 80% at 20% 50%, rgba(204,0,0,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 80% 20%, rgba(204,0,0,0.03) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-text {
    padding: 80px 60px 80px 80px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .hero-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--rojo);
    text-transform: uppercase;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .hero-eyebrow::before {
    content: '';
    display: block;
    width: 40px;
    height: 1px;
    background: var(--rojo);
  }

  .hero-title {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(48px, 6vw, 82px);
    font-weight: 700;
    line-height: 0.95;
    text-transform: uppercase;
    margin-bottom: 32px;
    color: var(--negro);
  }

  .hero-title .highlight {
    color: var(--rojo-vivo);
    display: block;
  }

  .hero-title .sub {
    font-size: 0.45em;
    font-weight: 400;
    color: rgba(0,0,0,0.4);
    display: block;
    letter-spacing: 0.05em;
    margin-top: 8px;
  }

  .hero-desc {
    font-size: 17px;
    font-weight: 300;
    line-height: 1.75;
    color: rgba(0,0,0,0.65);
    max-width: 480px;
    margin-bottom: 40px;
    font-style: italic;
  }

  .hero-meta {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
  }

  .meta-item {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(0,0,0,0.45);
    letter-spacing: 0.08em;
  }

  .meta-item strong {
    display: block;
    font-size: 18px;
    color: var(--rojo);
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    letter-spacing: 0;
  }

  .hero-visual {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: #f8f8f8;
  }

  .big-date {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(120px, 15vw, 220px);
    font-weight: 700;
    color: rgba(204,0,0,0.06);
    line-height: 1;
    user-select: none;
    position: absolute;
    right: -20px;
    writing-mode: vertical-rl;
    text-orientation: mixed;
    letter-spacing: -0.05em;
  }

  .law-card {
    background: #FFFFFF;
    border: 1px solid rgba(204,0,0,0.2);
    border-left: 4px solid var(--rojo);
    padding: 40px;
    max-width: 340px;
    position: relative;
    z-index: 1;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }

  .law-card h3 {
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--rojo);
    margin-bottom: 16px;
  }

  .law-card p {
    font-size: 13px;
    color: rgba(0,0,0,0.6);
    line-height: 1.7;
    margin-bottom: 20px;
  }

  .law-ref {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: rgba(0,0,0,0.3);
    border-top: 1px solid rgba(0,0,0,0.08);
    padding-top: 16px;
    letter-spacing: 0.05em;
  }

  /* ─── TICKER ──────────────────────────────────── */
  .ticker {
    background: var(--rojo);
    padding: 14px 0;
    overflow: hidden;
    white-space: nowrap;
    position: relative;
  }

  .ticker-inner {
    display: inline-flex;
    animation: ticker 40s linear infinite;
  }

  .ticker-item {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0 48px;
    color: rgba(255,255,255,0.9);
  }

  .ticker-item::after {
    content: '◆';
    margin-left: 48px;
    color: rgba(255,255,255,0.4);
  }

  @keyframes ticker {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  /* ─── SECTIONS ────────────────────────────────── */
  section {
    padding: 100px 80px;
  }

  .section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--rojo);
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-label::before {
    content: '';
    display: block;
    width: 30px;
    height: 1px;
    background: var(--rojo);
  }

  .section-title {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(32px, 4vw, 52px);
    font-weight: 700;
    text-transform: uppercase;
    line-height: 1.05;
    margin-bottom: 48px;
    color: var(--negro);
  }

  .section-title em {
    color: var(--rojo-vivo);
    font-style: normal;
  }

  /* ─── BLOQUES TEMÁTICOS ───────────────────────── */
  .bloques {
    background: #f5f5f5;
  }

  .bloques-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    margin-top: 60px;
  }

  .bloque {
    background: #FFFFFF;
    padding: 40px 36px;
    border-top: 3px solid var(--rojo-oscuro);
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    cursor: default;
  }

  .bloque:hover {
    background: #fff5f5;
    border-color: var(--rojo-vivo);
    box-shadow: 0 4px 16px rgba(204,0,0,0.08);
  }

  .bloque-icon {
    font-size: 28px;
    margin-bottom: 20px;
    display: block;
  }

  .bloque h3 {
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 14px;
    color: var(--negro);
  }

  .bloque p {
    font-size: 14px;
    color: rgba(0,0,0,0.6);
    line-height: 1.7;
    font-weight: 300;
  }

  .bloque-tag {
    display: inline-block;
    margin-top: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    background: rgba(204,0,0,0.08);
    color: var(--rojo);
    padding: 3px 8px;
    letter-spacing: 0.08em;
  }

  /* ─── NOVEDADES DESTACADAS ────────────────────── */
  .novedades {
    background: #FFFFFF;
  }

  .novedades-layout {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 80px;
    align-items: start;
  }

  .novedades-sidebar {
    position: sticky;
    top: 100px;
  }

  .novedades-sidebar p {
    font-size: 16px;
    color: rgba(0,0,0,0.6);
    line-height: 1.8;
    font-weight: 300;
    font-style: italic;
    margin-bottom: 32px;
  }

  .acuerdo-box {
    background: rgba(204,0,0,0.05);
    border-left: 3px solid var(--rojo);
    padding: 24px;
  }

  .acuerdo-box p {
    font-size: 13px;
    margin-bottom: 0;
    color: rgba(0,0,0,0.65);
  }

  .acuerdo-date {
    font-family: 'Oswald', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--rojo);
    display: block;
    margin-bottom: 8px;
  }

  .novedad-list {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .novedad-item {
    background: #fafafa;
    border: 1px solid rgba(0,0,0,0.06);
    padding: 28px 32px;
    display: grid;
    grid-template-columns: 48px 1fr;
    gap: 24px;
    align-items: start;
    transition: background 0.2s;
  }

  .novedad-item:hover {
    background: #fff5f5;
    border-color: rgba(204,0,0,0.2);
  }

  .novedad-num {
    font-family: 'Oswald', sans-serif;
    font-size: 32px;
    font-weight: 700;
    color: rgba(204,0,0,0.2);
    line-height: 1;
    text-align: right;
  }

  .novedad-content h4 {
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
    color: var(--negro);
  }

  .novedad-content p {
    font-size: 13px;
    color: rgba(0,0,0,0.55);
    line-height: 1.7;
    font-weight: 300;
  }

  /* ─── ARTÍCULOS CLAVE ─────────────────────────── */
  .articulos {
    background: var(--rojo-oscuro);
    position: relative;
    overflow: hidden;
  }

  .articulos::before {
    content: 'LEY';
    position: absolute;
    font-family: 'Oswald', sans-serif;
    font-size: 400px;
    font-weight: 700;
    color: rgba(255,255,255,0.03);
    right: -60px;
    top: 50%;
    transform: translateY(-50%);
    line-height: 1;
    pointer-events: none;
    user-select: none;
  }

  .articulos-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    position: relative;
    z-index: 1;
  }

  .art-card {
    background: rgba(0,0,0,0.3);
    padding: 28px 24px;
    border-bottom: 2px solid rgba(255,255,255,0.15);
    transition: border-color 0.2s;
  }

  .art-card:hover { border-color: var(--blanco); }

  .art-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.1em;
    margin-bottom: 12px;
  }

  .art-card h4 {
    font-family: 'Oswald', sans-serif;
    font-size: 15px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    margin-bottom: 10px;
    color: #fff;
  }

  .art-card p {
    font-size: 12px;
    color: rgba(255,255,255,0.65);
    line-height: 1.65;
    font-weight: 300;
  }

  /* ─── TIMELINE ────────────────────────────────── */
  .timeline-section {
    background: #f5f5f5;
  }

  .timeline {
    position: relative;
    margin-top: 60px;
    padding-left: 40px;
  }

  .timeline::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: linear-gradient(to bottom, var(--rojo), rgba(204,0,0,0.1));
  }

  .tl-item {
    position: relative;
    padding: 0 0 56px 60px;
    display: grid;
    grid-template-columns: 160px 1fr;
    gap: 40px;
    align-items: start;
  }

  .tl-item::before {
    content: '';
    position: absolute;
    left: -6px; top: 6px;
    width: 14px; height: 14px;
    background: var(--rojo);
    border: 2px solid #f5f5f5;
    outline: 2px solid var(--rojo);
  }

  .tl-date {
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--rojo);
    letter-spacing: 0.05em;
    padding-top: 2px;
  }

  .tl-body h4 {
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    font-weight: 600;
    text-transform: uppercase;
    margin-bottom: 8px;
    letter-spacing: 0.03em;
    color: var(--negro);
  }

  .tl-body p {
    font-size: 14px;
    color: rgba(0,0,0,0.6);
    line-height: 1.7;
    font-weight: 300;
  }

  /* ─── CTA ────────────────────────────────────── */
  .cta-section {
    background: var(--rojo);
    padding: 80px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .cta-section::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 10px,
      rgba(0,0,0,0.04) 10px,
      rgba(0,0,0,0.04) 20px
    );
  }

  .cta-section h2 {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(32px, 5vw, 64px);
    font-weight: 700;
    text-transform: uppercase;
    line-height: 1;
    margin-bottom: 24px;
    position: relative;
    color: #fff;
  }

  .cta-section p {
    font-size: 18px;
    font-weight: 300;
    font-style: italic;
    color: rgba(255,255,255,0.85);
    max-width: 600px;
    margin: 0 auto 40px;
    line-height: 1.7;
    position: relative;
  }

  .cta-buttons {
    display: flex;
    gap: 20px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    position: relative;
  }

  .cta-tagline {
    display: inline-block;
    font-family: 'Oswald', sans-serif;
    font-size: 22px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border: 2px solid rgba(255,255,255,0.6);
    padding: 16px 40px;
    color: #fff;
    text-decoration: none;
    transition: background 0.2s, border-color 0.2s;
    cursor: pointer;
  }

  .cta-tagline:hover {
    background: rgba(255,255,255,0.15);
    border-color: var(--blanco);
  }

  .btn-pdf {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    background: #FFFFFF;
    color: var(--rojo);
    border: 2px solid #fff;
    padding: 16px 32px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s, color 0.2s;
  }

  .btn-pdf:hover {
    background: rgba(255,255,255,0.9);
  }

  .btn-pdf svg {
    flex-shrink: 0;
  }

  footer {
    background: #0A0A0A;
    padding: 40px 80px;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 20px;
  }

  .footer-left {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.08em;
    line-height: 1.8;
  }

  .footer-right {
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--rojo-suave);
  }

  .divider {
    height: 1px;
    background: linear-gradient(to right, var(--rojo), transparent);
    margin: 0 80px;
  }

  nav {
    display: flex;
    gap: 4px;
  }

  nav a {
    font-family: 'Oswald', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    color: rgba(0,0,0,0.5);
    padding: 6px 14px;
    transition: color 0.15s;
  }

  nav a:hover { color: var(--negro); }

  @media (max-width: 900px) {
    .hero { grid-template-columns: 1fr; }
    .hero-visual { display: none; }
    .hero-text { padding: 60px 32px; }
    section { padding: 60px 32px; }
    .bloques-grid { grid-template-columns: 1fr; }
    .novedades-layout { grid-template-columns: 1fr; }
    .novedades-sidebar { position: static; }
    .articulos-grid { grid-template-columns: repeat(2,1fr); }
    .tl-item { grid-template-columns: 1fr; gap: 8px; }
    footer { padding: 32px; flex-direction: column; }
    .cta-section { padding: 60px 32px; }
    .divider { margin: 0 32px; }
    header { padding: 0 24px; }
    nav { display: none; }
    .cta-buttons { flex-direction: column; }
  }
</style>
</head>
<body>

<!-- ─── HEADER ─────────────────────────────────── -->
<header>
  <div class="logo-area">
